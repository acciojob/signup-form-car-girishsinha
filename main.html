<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<form method= "POST">
	<div>
		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name" required>
		
	</div>
		<div>
		<label for="email">Email</label>
		<input type="email" id="email" placeholder="Email" required>
		
	</div><div>
		<label>Gender</label>
		<input type="radio" id="genderM" value="male"  required>
		<label for="gender_m">Male</label>
		<input type="radio" id="genderF" value="female"  required>
		<label for="gender_f">Female</label>
		
		
	</div>

		<div>
			<label for="cars" >Car Brands</label>
			<select id="cars" name="cars" required>
				<option value="">--please choose an option--</option>
			<option value="toyota">Toyota</option>
			<option value="bmw">BMW</option>
			</select>
		</div>
		<div>
		<label for="age">Age</label>
		<input type="number" id="age" placeholder="Age" required>
		
	</div><div>
		<label for="dob">DOB</label>
		<input type="date" id="dob" required>
		
	</div><div>
		<label for="tel">Phone Number</label>
		<input type="tel" id="tel" placeholder="xxx+xxx+xxxx" >
		
	</div>
		<div>
		<label for="password">Password</label>
		<input type="password" id="password" placeholder="Password" required >
		
	</div><div>
		<input type="checkbox" id="tos" required >
		<label for="tos"> I agree to the TOS</label>
		
	</div>
		<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
